<div class="grid grid-cols-2 gap-3 xl:grid-cols-4">

  <!-- Total PRs -->
  <div class="flex items-center gap-3 rounded-lg border border-edge bg-panel px-4 py-3">
    <div class="rounded p-1.5 bg-accent-subtle" aria-hidden="true">
      <svg class="w-4 h-4 text-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="18" cy="18" r="3"/>
        <circle cx="6" cy="6" r="3"/>
        <path stroke-linecap="round" d="M13 6h3a2 2 0 0 1 2 2v7M6 9v12"/>
      </svg>
    </div>
    <div class="min-w-0">
      <div class="text-[11px] text-ink-3 truncate">Total PRs</div>
      <div class="text-[15px] font-bold tabular-nums text-ink leading-tight">{{ stats().total }}</div>
    </div>
  </div>

  <!-- Passed -->
  <div class="flex items-center gap-3 rounded-lg border border-edge bg-panel px-4 py-3">
    <div class="rounded p-1.5 bg-emerald-50 dark:bg-emerald-500/10" aria-hidden="true">
      <svg class="w-4 h-4 text-emerald-600 dark:text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
    </div>
    <div class="min-w-0">
      <div class="text-[11px] text-ink-3 truncate">Passed</div>
      <div class="text-[15px] font-bold tabular-nums text-ink leading-tight">{{ stats().passed }}</div>
    </div>
  </div>

  <!-- Running CI -->
  <div class="flex items-center gap-3 rounded-lg border border-edge bg-panel px-4 py-3">
    <div class="rounded p-1.5 bg-amber-50 dark:bg-amber-500/10" aria-hidden="true">
      <svg class="w-4 h-4 text-amber-600 dark:text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path stroke-linecap="round" d="M12 6v6l4 2"/>
      </svg>
    </div>
    <div class="min-w-0">
      <div class="text-[11px] text-ink-3 truncate">Running CI</div>
      <div class="text-[15px] font-bold tabular-nums text-ink leading-tight">{{ stats().running }}</div>
    </div>
  </div>

  <!-- Failing -->
  <div class="flex items-center gap-3 rounded-lg border border-edge bg-panel px-4 py-3">
    <div class="rounded p-1.5 bg-rose-50 dark:bg-rose-500/10" aria-hidden="true">
      <svg class="w-4 h-4 text-rose-600 dark:text-rose-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path stroke-linecap="round" d="M15 9l-6 6M9 9l6 6"/>
      </svg>
    </div>
    <div class="min-w-0">
      <div class="text-[11px] text-ink-3 truncate">Failing</div>
      <div class="text-[15px] font-bold tabular-nums text-ink leading-tight">{{ stats().failing }}</div>
    </div>
  </div>

</div>
