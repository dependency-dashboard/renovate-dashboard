<!-- Rendered as a row inside the app's single bordered, divided container -->
<div>

  <!-- Group Header -->
  <div class="px-4 py-3 flex flex-wrap items-center gap-3 justify-between">
    <button
      type="button"
      class="flex items-center gap-2.5 flex-1 min-w-0 text-left group"
      (click)="onToggleGroup()"
      [attr.aria-expanded]="group().isExpanded"
      [attr.aria-controls]="group().isExpanded ? panelId() : null"
    >
      <app-ci-status-icon class="shrink-0" [status]="group().aggregateCiStatus" [label]="ciStatusLabel()" />
      <span class="text-sm font-medium text-ink group-hover:text-accent truncate transition-colors duration-200 pr-1">{{ group().title }}</span>
      <svg
        class="w-4 h-4 text-ink-3 shrink-0 transition-transform duration-200"
        [class.rotate-180]="group().isExpanded"
        fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
        aria-hidden="true"
      >
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
      </svg>
    </button>

    <div class="flex items-center gap-3 flex-wrap justify-end">
      <!-- Workflow status dots -->
      <div class="flex items-center gap-3 text-xs text-ink-2">
        <span
          class="flex items-center gap-1.5"
          title="Successful workflows"
          [attr.aria-label]="'Successful workflows: ' + group().workflowSummary.success"
        >
          <span class="size-2 rounded-full bg-emerald-500 shrink-0" aria-hidden="true"></span>
          {{ group().workflowSummary.success }}
        </span>
        <span
          class="flex items-center gap-1.5"
          title="Pending workflows"
          [attr.aria-label]="'Pending workflows: ' + group().workflowSummary.pending"
        >
          <span class="size-2 rounded-full bg-amber-400 shrink-0" aria-hidden="true"></span>
          {{ group().workflowSummary.pending }}
        </span>
        <span
          class="flex items-center gap-1.5"
          title="Failed workflows"
          [attr.aria-label]="'Failed workflows: ' + group().workflowSummary.failed"
        >
          <span class="size-2 rounded-full bg-rose-500 shrink-0" aria-hidden="true"></span>
          {{ group().workflowSummary.failed }}
        </span>
      </div>

      <!-- PR count badge -->
      <span class="px-2 py-0.5 rounded-md bg-ghost border border-edge text-xs text-ink-2 font-mono">{{ group().prs.length }} PRs</span>

      <!-- Action buttons -->
      <div class="flex gap-2">
        <button
          type="button"
          class="p-1.5 rounded-md text-ink-3 hover:text-ink hover:bg-ghost disabled:opacity-40 disabled:cursor-not-allowed transition-colors duration-200"
          (click)="onRefreshGroup()"
          [disabled]="refreshing() || isGroupProcessing()"
          [attr.aria-label]="'Refresh statuses for group: ' + group().title"
        >
          <svg class="w-4 h-4" [class.animate-spin]="refreshing()" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M20 20v-5h-5M5.07 15a7 7 0 0 0 11.6 2.6L20 15M18.93 9a7 7 0 0 0-11.6-2.6L4 9"/>
          </svg>
        </button>
        <button
          type="button"
          class="px-3 py-1.5 text-xs font-medium rounded-md border border-edge text-ink-2 hover:bg-ghost disabled:opacity-40 disabled:cursor-not-allowed transition-colors duration-200"
          (click)="onCloseGroup()"
          [disabled]="group().prs.length === 0 || isGroupProcessing()"
          [attr.aria-label]="'Close all PRs in group: ' + group().title"
        >
          Close All
        </button>
        <button
          type="button"
          class="px-3 py-1.5 text-xs font-medium rounded-md bg-accent text-white hover:bg-accent-hover disabled:opacity-40 disabled:cursor-not-allowed transition-colors duration-200"
          (click)="onApproveAndMergeGroup()"
          [disabled]="group().prs.length === 0 || isGroupMergeDisabled()"
          [attr.aria-label]="'Approve and merge all PRs in group: ' + group().title"
        >
          Approve &amp; Merge All
        </button>
      </div>
    </div>
  </div>

  <!-- Expanded PR list -->
  @if (group().isExpanded) {
    <div class="border-t border-edge divide-y divide-edge" [id]="panelId()" role="region" [attr.aria-label]="'Pull requests in group: ' + group().title">
      @for (pr of group().prs; track pr.uid) {
        <app-pr-item
          [pr]="pr"
          [expanded]="expandedPrIds().has(pr.uid)"
          (toggleExpanded)="togglePrExpansion(pr)"
          (closePr)="onClosePr($event)"
          (approveAndMergePr)="onApproveAndMergePr($event)">
        </app-pr-item>
      }
    </div>
  }

</div>
