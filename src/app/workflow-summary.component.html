@if (isLoading()) {
  <span class="text-xs text-ink-3">Loading…</span>
} @else if (summary().success > 0 || summary().pending > 0 || summary().failed > 0 || summary().incompleteResults) {
  <div class="flex items-center gap-3 text-xs text-ink-2">
    <span
      class="flex items-center gap-1.5"
      title="Successful workflows"
      [attr.aria-label]="'Successful workflows: ' + summary().success"
    >
      <span class="size-2 rounded-full bg-emerald-500 shrink-0" aria-hidden="true"></span>
      {{ summary().success }}
    </span>
    <span
      class="flex items-center gap-1.5"
      title="Pending workflows"
      [attr.aria-label]="'Pending workflows: ' + summary().pending"
    >
      <span class="size-2 rounded-full bg-amber-400 shrink-0" aria-hidden="true"></span>
      {{ summary().pending }}
    </span>
    <span
      class="flex items-center gap-1.5"
      title="Failed workflows"
      [attr.aria-label]="'Failed workflows: ' + summary().failed"
    >
      <span class="size-2 rounded-full bg-rose-500 shrink-0" aria-hidden="true"></span>
      {{ summary().failed }}
    </span>
    @if (summary().incompleteResults) {
      <span title="Workflow counts may be incomplete — the GitHub Search API returned partial results" class="text-amber-400 cursor-help text-xs">⚠</span>
    }
  </div>
}
