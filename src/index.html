<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Renovate PR Dashboard</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('theme');
        if (theme === 'dark' || !theme) {
          document.documentElement.classList.add('dark');
        }
      } catch (_) {
        // localStorage unavailable (e.g. Safari private mode, blocked storage);
        // fall back to dark mode default.
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
</head>
<body>
  <app-root></app-root>
</body>
</html>
